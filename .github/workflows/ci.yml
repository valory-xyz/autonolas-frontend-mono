name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.app }})
    strategy:
      fail-fast: false
      matrix:
        app: [build, contribute, govern, launch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install modules
        run: yarn
      - name: Run ESLint
        run: yarn nx lint ${{ matrix.app }}
      - name: Run Test
        run: yarn nx test ${{ matrix.app }}

  lint-only:
    name: Lint (${{ matrix.app }})
    strategy:
      fail-fast: false
      matrix:
        app: [marketplace, operate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install modules
        run: yarn
      - name: Run ESLint
        run: yarn nx lint ${{ matrix.app }}

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: |
          wget https://github.com/zricethezav/gitleaks/releases/download/v8.10.1/gitleaks_8.10.1_linux_x64.tar.gz && \
          tar -xzf gitleaks_8.10.1_linux_x64.tar.gz && \
          sudo install gitleaks /usr/bin && \
          gitleaks detect --report-format json --report-path leak_report -v

  snyk:
    name: Snyk Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - name: Setup Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: '22.x'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
      - name: Verify Snyk authentication
        run: |
          snyk auth ${{ secrets.SNYK_TOKEN }} || {
            echo "Snyk authentication failed. Check token validity."
            exit 1
          }
      - name: Snyk Code test (SAST)
        run: |
          snyk code test --org=00508cff-0e2b-4bb5-aaf0-9fa7cc430473 --sarif > snyk-code.sarif 2>&1 || true
          echo "Snyk Code test completed."
        continue-on-error: true
      - name: Snyk Open Source monitor
        run: |
          snyk monitor --org=00508cff-0e2b-4bb5-aaf0-9fa7cc430473 --file=package.json --project-name="autonolas-frontend-mono" || true
        continue-on-error: true
      - name: Print Snyk error log (if any)
        if: always()
        run: |
          if [ -s snyk-error.log ]; then
            echo "Snyk error output:"
            cat snyk-error.log
          else
            echo "No Snyk errors found."
          fi
      - name: Validate SARIF output
        id: validate_sarif
        run: |
          if [ -f snyk-code.sarif ] && [ -s snyk-code.sarif ]; then
            if head -c 1 snyk-code.sarif | grep -q '^{'; then
              if grep -q '"runs": *\[\]' snyk-code.sarif || ! grep -q '"results"' snyk-code.sarif; then
                echo "SARIF has no security findings. Skipping upload."
                echo "sarif_valid=false" >> $GITHUB_OUTPUT
              else
                echo "Valid SARIF with findings detected."
                echo "sarif_valid=true" >> $GITHUB_OUTPUT
              fi
            else
              echo "Invalid JSON format detected. Skipping upload."
              echo "sarif_valid=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "SARIF file missing or empty. Skipping upload."
            echo "sarif_valid=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload SARIF to GitHub Code Scanning
        if: steps.validate_sarif.outputs.sarif_valid == 'true'
        uses: github/codeql-action/upload-sarif@e2b3eafc8d227b0241d48be5f425d47c2d750a13 # v3.26.10
        with:
          sarif_file: snyk-code.sarif

  all-checks-passed:
    name: All checks passed
    needs: [lint-and-test, lint-only, gitleaks, snyk]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed."
