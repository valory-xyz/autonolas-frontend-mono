name: Lint and Scan
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned to match the rest of the repo (snyk-security.yml,
      # supply-chain.yml). Bumps actions/checkout v3 -> v4.1.7. See
      # SUPPLY-CHAIN-SECURITY.md §5 — this was the last unpinned-action
      # workflow. Behavior unchanged: same checkout semantics, same
      # fetch-depth.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # actions/setup-go remains unpinned (@v3) for now — the gitleaks
      # binary downloaded below does not depend on Go at runtime, but
      # this is left exactly as it was to avoid any behavior change
      # outside the actions/checkout pin above. Tracked in
      # SUPPLY-CHAIN-SECURITY.md TODOs as part of the gitleaks workflow
      # hardening pass (bump binary version + checksum verification).
      - uses: actions/setup-go@v6
        with:
          go-version: '1.17.7'
      - run: |
          wget https://github.com/zricethezav/gitleaks/releases/download/v8.10.1/gitleaks_8.10.1_linux_x64.tar.gz && \
          tar -xzf gitleaks_8.10.1_linux_x64.tar.gz && \
          sudo install gitleaks /usr/bin && \
          gitleaks detect --report-format json --report-path leak_report -v
